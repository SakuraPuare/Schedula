version: '3'
services:
  mysql:
    # 镜像名
    image: mysql:8.0.21
    # 容器名(以后的控制都通过这个)
    container_name: mysql
    # 重启策略
    restart: always
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      # root 密码
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_password}
      # 初始化数据库(后续的初始化sql会在这个库执行)
      MYSQL_DATABASE: database_exp
      # 初始化用户(不能是root 会报错, 后续需要给新用户赋予权限)
      MYSQL_USER: ${MYSQL_APP_USER:-app_user}
      # 用户密码
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-change_me_app_password}
    # 映射端口
    ports:
      - 3307:3306 
    volumes:
      # 数据挂载
      - ./sql/data/:/var/lib/mysql/
      # 配置挂载
      - ./sql/conf/:/etc/mysql/conf.d/
      # 初始化目录挂载
      - ./sql/init/:/docker-entrypoint-initdb.d/
    command:
      # 将mysql8.0默认密码策略 修改为原先策略 (mysql8.0对其默认策略做了更改 会导致密码无法匹配)
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    networks:
      - servernet
  scheduler:
    build: ./scheduler
    ports:
      - "50051:50051"
    networks:
      - servernet
  backend:
    build: ./
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - scheduler
    networks:
      - servernet

networks:
  servernet:
